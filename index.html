/* ─── PHOTO IMAGE COMPONENTS ─── */

const PHOTOS = {
  hero:      'uploads/hero-truck.jpg',
  truck:     'https://images.unsplash.com/photo-1601584115197-04ecc0da31d7?auto=format&fit=crop&w=1200&q=80',
  highway:   'uploads/interstate-freight.jpg',
  bridge:    'uploads/reefer-route.jpg',
  warehouse: 'uploads/produce-market.jpg',
  port:      'https://images.unsplash.com/photo-1578575437130-527eed3abbec?auto=format&fit=crop&w=1200&q=80',
  fleet:     'https://images.unsplash.com/photo-1519003722824-194d4455a60c?auto=format&fit=crop&w=1200&q=80',
  about:     'uploads/about-essence.jpg',
};

function getPhotoUrl(label) {
  if (!label) return PHOTOS.highway;
  if (label.includes('NYC SKYLINE AT DUSK')) return PHOTOS.hero;
  if (label.includes('LOADING DOCK'))        return PHOTOS.truck;
  if (label.includes('HIGHWAY'))             return PHOTOS.highway;
  if (label.includes('BROOKLYN BRIDGE'))     return PHOTOS.bridge;
  if (label.includes('HUNTS POINT FOOD'))    return PHOTOS.warehouse;
  if (label.includes('PORT NEWARK'))         return PHOTOS.port;
  if (label.includes('FLEET LINEUP'))        return PHOTOS.fleet;
  if (label.includes('COMPANY FOUNDER'))     return PHOTOS.about;
  return PHOTOS.highway;
}

function ImgPlaceholder({ label, width = '100%', height = 420, style = {} }) {
  const h = typeof height === 'number' ? height : 420;
  const isHero = label && label.includes('NYC SKYLINE AT DUSK');
  const overlayBg = isHero
    ? 'linear-gradient(105deg, rgba(11,20,37,0.92) 0%, rgba(11,20,37,0.6) 50%, rgba(11,20,37,0.3) 100%)'
    : 'linear-gradient(to bottom, rgba(11,20,37,0.45) 0%, rgba(11,20,37,0.65) 100%)';
  return (
    <div style={{ position:'relative', width, height:h, overflow:'hidden', display:'block', flexShrink:0, ...style }}>
      <img
        src={getPhotoUrl(label)}
        alt={label || ''}
        style={{ position:'absolute', inset:0, width:'100%', height:'100%', objectFit:'cover', objectPosition:'center' }}
      />
      <div style={{ position:'absolute', inset:0, background: overlayBg }} />
    </div>
  );
}

  const [errors, setErrors] = useState({});

  const validate = () => {
    const e = {};
    if (!form.name.trim()) e.name = 'Required';
    if (!form.email.trim() || !/\S+@\S+\.\S+/.test(form.email)) e.email = 'Valid email required';
    if (!form.phone.trim()) e.phone = 'Required';
    if (!form.origin.trim()) e.origin = 'Required';
    if (!form.dest.trim()) e.dest = 'Required';

function TweaksPanel({ tweaks, setTweaks, visible }) {
  if (!visible) return null;
  const update = (key, val) => {
    const next = { ...tweaks, [key]: val };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
  };
  return (
    <div style={{ position:'fixed',bottom:24,right:24,zIndex:9999,background:'#0d1a2e',border:'1px solid rgba(240,237,232,0.15)',boxShadow:'0 20px 60px rgba(0,0,0,0.6)',padding:'24px',width:280,borderTop:`3px solid ${tweaks.accentColor}` }}>

    window.scrollTo({ top: 0, behavior: 'instant' });
  }, [page]);

  // Apply tweaks to CSS variables
  useEffect(() => {
    document.documentElement.style.setProperty('--navy', tweaks.navyColor);
    document.documentElement.style.setProperty('--navy-mid', tweaks.navyColor === '#0B1425' ? '#111E33' : tweaks.navyColor + 'cc');
    document.documentElement.style.setProperty('--navy-light', '#1A2C47');
    document.documentElement.style.setProperty('--orange', tweaks.accentColor);
  }, [tweaks]);

  useEffect(() => {
    window.addEventListener('message', (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksVisible(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksVisible(false);
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
  }, []);

  const pages = { Home: <HomePage setPage={setPage} tweaks={tweaks} />, Services: <ServicesPage setPage={setPage} tweaks={tweaks} />, 'About Us': <AboutPage setPage={setPage} tweaks={tweaks} />, Contact: <ContactPage tweaks={tweaks} /> };

  return (
    <div style={{ background: tweaks.navyColor }}>
      <Navbar page={page} setPage={setPage} tweaks={tweaks} />
      <main>{pages[page]}</main>
      <Footer setPage={setPage} tweaks={tweaks} />
      <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} visible={tweaksVisible} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
