<script type="text/babel">
const { useState, useEffect, useRef } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#F26522",
  "navyColor": "#0B1425",
  "heroStyle": "diagonal"
}/*EDITMODE-END*/;

/* ─── PHOTO IMAGE COMPONENTS ─── */

const PHOTOS = {
  hero:      'uploads/hero-truck.jpg',
  truck:     'https://images.unsplash.com/photo-1601584115197-04ecc0da31d7?auto=format&fit=crop&w=1200&q=80',
  highway:   'uploads/interstate-freight.jpg',
  bridge:    'uploads/reefer-route.jpg',
  warehouse: 'uploads/produce-market.jpg',
  port:      'https://images.unsplash.com/photo-1578575437130-527eed3abbec?auto=format&fit=crop&w=1200&q=80',
  fleet:     'https://images.unsplash.com/photo-1519003722824-194d4455a60c?auto=format&fit=crop&w=1200&q=80',
  about:     'uploads/about-essence.jpg',
};

function getPhotoUrl(label) {
  if (!label) return PHOTOS.highway;
  if (label.includes('NYC SKYLINE AT DUSK')) return PHOTOS.hero;
  if (label.includes('LOADING DOCK'))        return PHOTOS.truck;
  if (label.includes('HIGHWAY'))             return PHOTOS.highway;
  if (label.includes('BROOKLYN BRIDGE'))     return PHOTOS.bridge;
  if (label.includes('HUNTS POINT FOOD'))    return PHOTOS.warehouse;
  if (label.includes('PORT NEWARK'))         return PHOTOS.port;
  if (label.includes('FLEET LINEUP'))        return PHOTOS.fleet;
  if (label.includes('COMPANY FOUNDER'))     return PHOTOS.about;
  return PHOTOS.highway;
}

function ImgPlaceholder({ label, width = '100%', height = 420, style = {} }) {
  const h = typeof height === 'number' ? height : 420;
  const isHero = label && label.includes('NYC SKYLINE AT DUSK');
  const overlayBg = isHero
    ? 'linear-gradient(105deg, rgba(11,20,37,0.92) 0%, rgba(11,20,37,0.6) 50%, rgba(11,20,37,0.3) 100%)'
    : 'linear-gradient(to bottom, rgba(11,20,37,0.45) 0%, rgba(11,20,37,0.65) 100%)';
  return (
    <div style={{ position:'relative', width, height:h, overflow:'hidden', display:'block', flexShrink:0, ...style }}>
      <img
        src={getPhotoUrl(label)}
        alt={label || ''}
        style={{ position:'absolute', inset:0, width:'100%', height:'100%', objectFit:'cover', objectPosition:'center' }}
      />
      <div style={{ position:'absolute', inset:0, background: overlayBg }} />
    </div>
  );
}
/* ─── NAVBAR ─── */
function Navbar({ page, setPage, tweaks }) {
  const [scrolled, setScrolled] = useState(false);
  const [mobileOpen, setMobileOpen] = useState(false);
  useEffect(() => {
    const fn = () => setScrolled(window.scrollY > 40);
    window.addEventListener('scroll', fn);
    return () => window.removeEventListener('scroll', fn);
  }, []);

  useEffect(() => { setMobileOpen(false); }, [page]);

  const isOpaque = scrolled || mobileOpen;
  const navStyle = {
    position: 'fixed', top: 0, left: 0, right: 0, zIndex: 1000,
    background: isOpaque ? 'rgba(11,20,37,0.97)' : 'transparent',
    backdropFilter: isOpaque ? 'blur(12px)' : 'none',
    borderBottom: isOpaque ? '1px solid rgba(240,237,232,0.08)' : '1px solid transparent',
    transition: 'background 0.3s ease, border-color 0.3s ease',
    padding: '0 24px',
  };
  const links = ['Home','Services','About Us','Contact'];

  const linkBtn = (l, extra = {}) => (
    <button key={l} onClick={() => setPage(l)} style={{
      background: 'none', border: 'none', cursor: 'pointer',
      fontFamily: 'Barlow Condensed', fontWeight: 700, fontSize: 15,
      letterSpacing: '0.12em', textTransform: 'uppercase',
      color: page === l ? tweaks.accentColor : 'var(--white)',
      padding: '8px 16px',
      borderBottom: page === l ? `2px solid ${tweaks.accentColor}` : '2px solid transparent',
      transition: 'color 0.2s',
      ...extra,
    }}>{l}</button>
  );

  return (
    <nav style={navStyle}>
      <div style={{ maxWidth: 1280, margin: '0 auto', display: 'flex', alignItems: 'center', height: 72, justifyContent: 'space-between' }}>
        {/* Logo */}
        <button onClick={() => { setPage('Home'); setMobileOpen(false); }} style={{ background:'none',border:'none',cursor:'pointer',display:'flex',alignItems:'center',gap:12 }}>

            <span style={{ fontFamily:'Barlow Condensed',fontWeight:900,fontSize:18,color:'#fff',letterSpacing:'-0.02em' }}>H</span>
          </div>
          <div style={{ textAlign:'left' }}>
            <div style={{ fontFamily:'Barlow Condensed',fontWeight:800,fontSize:20,color:'var(--white)',letterSpacing:'0.06em',textTransform:'uppercase',lineHeight:1 }}>Hunts Point</div>
            <div style={{ fontFamily:'Barlow Condensed',fontWeight:600,fontSize:12,color: tweaks.accentColor,letterSpacing:'0.2em',textTransform:'uppercase',lineHeight:1,marginTop:2 }}>Haulers LLC</div>
          </div>
        </button>

        {/* Desktop nav */}
        <div className="hide-mobile" style={{ display:'flex', gap:8, alignItems:'center' }}>
          {links.map(l => linkBtn(l))}
          <button onClick={() => setPage('Contact')} style={{
            marginLeft: 16, background: tweaks.accentColor, border: 'none', cursor: 'pointer',
            fontFamily: 'Barlow Condensed', fontWeight: 800, fontSize: 14, letterSpacing: '0.15em',
            textTransform: 'uppercase', color: '#fff', padding: '10px 24px',
            clipPath: 'polygon(0 0, 95% 0, 100% 100%, 5% 100%)',
          }}>Get a Quote</button>
        </div>

        {/* Mobile hamburger */}
        <button
          className="show-mobile"
          aria-label="Toggle menu"
          aria-expanded={mobileOpen}
          onClick={() => setMobileOpen(o => !o)}
          style={{
            display:'none',
            background:'none', border:'none', cursor:'pointer',
            padding:10, flexDirection:'column', gap:5,
          }}>
          <span style={{ width:24, height:2, background:'var(--white)', transition:'transform 0.2s', transform: mobileOpen ? 'translateY(7px) rotate(45deg)' : 'none' }} />
          <span style={{ width:24, height:2, background:'var(--white)', opacity: mobileOpen ? 0 : 1, transition:'opacity 0.2s' }} />
          <span style={{ width:24, height:2, background:'var(--white)', transition:'transform 0.2s', transform: mobileOpen ? 'translateY(-7px) rotate(-45deg)' : 'none' }} />
        </button>
      </div>

      {/* Mobile menu panel */}
      {mobileOpen && (
        <div className="show-mobile" style={{
          display:'none', flexDirection:'column',
          padding:'12px 16px 20px',
          borderTop:'1px solid var(--rule)',
        }}>
          {links.map(l => (
            <button key={l} onClick={() => setPage(l)} style={{
              background:'none', border:'none', cursor:'pointer', textAlign:'left',
              fontFamily:'Barlow Condensed', fontWeight:700, fontSize:18,
              letterSpacing:'0.12em', textTransform:'uppercase',
              color: page === l ? tweaks.accentColor : 'var(--white)',
              padding:'14px 8px',
              borderBottom: '1px solid var(--rule)',
            }}>{l}</button>
          ))}
          <button onClick={() => setPage('Contact')} style={{
            marginTop:16, background:tweaks.accentColor, border:'none', cursor:'pointer',
            fontFamily:'Barlow Condensed', fontWeight:800, fontSize:15, letterSpacing:'0.15em',
            textTransform:'uppercase', color:'#fff', padding:'14px 24px',
            clipPath:'polygon(0 0, 97% 0, 100% 100%, 3% 100%)',
          }}>Get a Quote</button>
        </div>
      )}
    </nav>
  );
}

/* ─── FOOTER ─── */

            <div style={{ fontFamily:'Barlow Condensed',fontWeight:600,fontSize:13,color:tweaks.accentColor,letterSpacing:'0.18em',textTransform:'uppercase',marginBottom:16 }}>Tri-State Freight Carrier</div>
            <p style={{ color:'var(--white-dim)',fontSize:14,lineHeight:1.7,maxWidth:280 }}>Reliable interstate freight and NYC metro delivery. Specialists in produce transportation — door to door, shipper to dock, 24/7/365.</p>

        </div>
      </div>

  );
}

const WEB3FORMS_ACCESS_KEY = 'cc2e979a-a7f9-4638-8509-1921413b1461';

function ContactPage({ tweaks }) {
  const [form, setForm] = useState({ name:'',company:'',email:'',phone:'',origin:'',dest:'',commodity:'',weight:'',date:'',notes:'' });
  const [submitted, setSubmitted] = useState(false);
  const [errors, setErrors] = useState({});
  const [submitting, setSubmitting] = useState(false);
  const [submitError, setSubmitError] = useState('');

  const validate = () => {
    const e = {};
    if (!form.name.trim()) e.name = 'Required';
    if (!form.email.trim() || !/\S+@\S+\.\S+/.test(form.email)) e.email = 'Valid email required';
    if (!form.phone.trim()) e.phone = 'Required';
    if (!form.origin.trim()) e.origin = 'Required';
    if (!form.dest.trim()) e.dest = 'Required';
    return e;
  };

  const handleSubmit = async (e) => {
    e.preventDefault();
    const errs = validate();
    if (Object.keys(errs).length) { setErrors(errs); return; }

    setSubmitting(true);
    setSubmitError('');

    try {
      const res = await fetch('https://api.web3forms.com/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
        body: JSON.stringify({
          access_key: WEB3FORMS_ACCESS_KEY,
          subject: `Quote request from ${form.name}${form.company ? ' (' + form.company + ')' : ''}`,
          from_name: 'Hunts Point Haulers — Website',
          replyto: form.email,
          name: form.name,
          company: form.company,
          email: form.email,
          phone: form.phone,
          origin: form.origin,
          destination: form.dest,
          commodity: form.commodity,
          weight: form.weight,
          pickup_date: form.date,
          notes: form.notes,
        }),
      });
      const data = await res.json().catch(() => ({}));
      if (res.ok && data.success) {
        setSubmitted(true);
      } else {
        setSubmitError((data && data.message) || 'Submission failed. Please call dispatch at (201) 908-2622.');
        setSubmitting(false);
      }
    } catch (err) {
      setSubmitError('Network error. Please call dispatch at (201) 908-2622.');
      setSubmitting(false);

            <form onSubmit={handleSubmit}>
              <div className="r-form-grid" style={{ display:'grid',gridTemplateColumns:'1fr 1fr',gap:20,marginBottom:20 }}>
                {[
                  { field:'name',label:'Full Name *',placeholder:'John Smith' },
                  { field:'company',label:'Company',placeholder:'Acme Distributors Inc.' },
                  { field:'email',label:'Email Address *',placeholder:'john@company.com',type:'email' },
                  { field:'phone',label:'Phone Number *',placeholder:'(201) 555-0000' },
                ].map(({ field, label, placeholder, type='text' }) => (
                  <div key={field}>
                    <label style={labelStyle}>{label}</label>
                    <input type={type} placeholder={placeholder} value={form[field]}
                      onChange={e => { setForm({...form,[field]:e.target.value}); setErrors({...errors,[field]:''}); }}
                      style={inputStyle(field)} />
                    {errors[field] && <div style={{ color:tweaks.accentColor,fontSize:11,marginTop:4 }}>{errors[field]}</div>}
                  </div>
                ))}
              </div>

              <div className="r-form-grid" style={{ display:'grid',gridTemplateColumns:'1fr 1fr',gap:20,marginBottom:20 }}>
                {[
                  { field:'origin',label:'Origin City / State *',placeholder:'Philadelphia, PA' },
                  { field:'dest',label:'Destination City / State *',placeholder:'Hunts Point, Bronx NY' },
                  { field:'commodity',label:'Commodity / Freight Type',placeholder:'Produce, dry goods, etc.' },
                  { field:'weight',label:'Estimated Weight',placeholder:'20,000 lbs' },
                ].map(({ field, label, placeholder }) => (
                  <div key={field}>
                    <label style={labelStyle}>{label}</label>
                    <input type="text" placeholder={placeholder} value={form[field]}
                      onChange={e => { setForm({...form,[field]:e.target.value}); setErrors({...errors,[field]:''}); }}
                      style={inputStyle(field)} />
                    {errors[field] && <div style={{ color:tweaks.accentColor,fontSize:11,marginTop:4 }}>{errors[field]}</div>}
                  </div>
                ))}
              </div>

              <div style={{ marginBottom:20 }}>
                <label style={labelStyle}>Requested Pickup Date</label>
                <input type="date" value={form.date} onChange={e => setForm({...form,date:e.target.value})} style={{ ...inputStyle('date'),colorScheme:'dark' }} />
              </div>

              <div style={{ marginBottom:32 }}>
                <label style={labelStyle}>Additional Notes</label>
                <textarea placeholder="Special requirements, loading dock info, temperature requirements, time windows..." value={form.notes}
                  onChange={e => setForm({...form,notes:e.target.value})}
                  style={{ ...inputStyle('notes'),resize:'vertical',minHeight:100 }} />
              </div>

              <button type="submit" disabled={submitting} style={{
                background:tweaks.accentColor,border:'none',cursor:submitting?'wait':'pointer',
                fontFamily:'Barlow Condensed',fontWeight:800,fontSize:16,letterSpacing:'0.15em',
                textTransform:'uppercase',color:'#fff',padding:'18px 48px',
                clipPath:'polygon(0 0, 97% 0, 100% 100%, 3% 100%)',
                transition:'all 0.2s',
                opacity:submitting?0.6:1,
              }}>{submitting ? 'Sending…' : 'Submit Quote Request →'}</button>
              {submitError && <div style={{ color:tweaks.accentColor,fontSize:13,marginTop:12,fontWeight:600 }}>{submitError}</div>}
              <div style={{ color:'var(--white-dim)',fontSize:12,marginTop:12 }}>We respond within minutes. All information is kept strictly confidential.</div>
            </form>

            {/* New Customer Onboarding */}
            <div style={{ marginTop:64, borderTop:'1px solid var(--rule)', paddingTop:48 }}>
              <div style={{ fontFamily:'Barlow Condensed',fontWeight:800,fontSize:28,color:'var(--white)',marginBottom:8 }}>NEW CUSTOMER SETUP</div>
              <div style={{ width:48,height:3,background:tweaks.accentColor,marginBottom:20 }} />
              <p style={{ color:'var(--white-dim)',fontSize:15,lineHeight:1.75,marginBottom:28 }}>
                Ready to set up an account? Request our customer onboarding packet below. Complete the credit application and carrier setup form and return it to <span style={{ color:'var(--white)' }}>Accounting@huntspointhaulers.com</span>. Our team will have you active within 24–48 hours.
              </p>
              <div className="r-form-grid" style={{ display:'grid',gridTemplateColumns:'1fr 1fr',gap:16 }}>
                <a href="mailto:Accounting@huntspointhaulers.com?subject=New Customer Onboarding Request" style={{
                  display:'flex', alignItems:'center', gap:16,
                  background:'var(--navy-mid)', border:`1px solid ${tweaks.accentColor}44`,
                  padding:'20px 24px', textDecoration:'none', transition:'border 0.2s',
                }}>
                  <div style={{ width:40,height:40,background:tweaks.accentColor,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,clipPath:'polygon(0 0,85% 0,100% 100%,15% 100%)' }}>
                    <span style={{ color:'#fff',fontSize:18 }}>📋</span>
                  </div>
                  <div>
                    <div style={{ fontFamily:'Barlow Condensed',fontWeight:800,fontSize:15,color:'var(--white)',textTransform:'uppercase',letterSpacing:'0.06em' }}>Customer Setup Packet</div>
                    <div style={{ color:'var(--white-dim)',fontSize:12,marginTop:2 }}>Request via email</div>
                  </div>
                </a>
                <a href="mailto:Dispatch@huntspointhaulers.com?subject=New Customer — Carrier Setup" style={{
                  display:'flex', alignItems:'center', gap:16,
                  background:'var(--navy-mid)', border:`1px solid ${tweaks.accentColor}44`,
                  padding:'20px 24px', textDecoration:'none',
                }}>
                  <div style={{ width:40,height:40,background:'var(--navy-light)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,clipPath:'polygon(0 0,85% 0,100% 100%,15% 100%)' }}>
                    <span style={{ color:tweaks.accentColor,fontSize:18 }}>🚛</span>
                  </div>
                  <div>
                    <div style={{ fontFamily:'Barlow Condensed',fontWeight:800,fontSize:15,color:'var(--white)',textTransform:'uppercase',letterSpacing:'0.06em' }}>Carrier Setup Form</div>
                    <div style={{ color:'var(--white-dim)',fontSize:12,marginTop:2 }}>Contact dispatch directly</div>
                  </div>
                </a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ─── APP ─── */
function App() {
  const [page, setPage] = useState(() => localStorage.getItem('hph_page') || 'Home');
  const tweaks = TWEAK_DEFAULTS;

  useEffect(() => {
    localStorage.setItem('hph_page', page);
    window.scrollTo({ top: 0, behavior: 'instant' });
  }, [page]);

  useEffect(() => {
    document.documentElement.style.setProperty('--navy', tweaks.navyColor);
    document.documentElement.style.setProperty('--navy-mid', tweaks.navyColor === '#0B1425' ? '#111E33' : tweaks.navyColor + 'cc');
    document.documentElement.style.setProperty('--orange', tweaks.accentColor);
  }, [tweaks.navyColor, tweaks.accentColor]);

  const pages = {
    Home:        <HomePage setPage={setPage} tweaks={tweaks} />,
    Services:    <ServicesPage setPage={setPage} tweaks={tweaks} />,
    'About Us':  <AboutPage setPage={setPage} tweaks={tweaks} />,
    Contact:     <ContactPage tweaks={tweaks} />,
  };

  return (
    <div style={{ background: tweaks.navyColor }}>
      <Navbar page={page} setPage={setPage} tweaks={tweaks} />
      <main>{pages[page]}</main>
      <Footer setPage={setPage} tweaks={tweaks} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
